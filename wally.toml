[package]
name = "rbxxaxa/replicant"
description = "Server-authoritative replicated component framework for Roblox: OOP components with auto-replicated state (replicated/server/client buckets), server-only events, ownership-validated client->server messages, a buffer-packed u16 wire protocol, and lifecycle/heartbeat management."
version = "0.2.1"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
authors = ["mira"]
exclude = ["**/*.zip", "tests/**", "dev.project.json", "sourcemap.json", "globalTypes.d.luau", "Packages/**", "ServerPackages/**"]

[dependencies]
Signal = "sleitnick/signal@2.0.3"
